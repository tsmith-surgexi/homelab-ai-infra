# Monitoring stack — metrics + dashboards for GPU/throughput/latency.
# Placeholders only.
services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.example.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}   # set in .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]

  # Exporter for NVIDIA GPU metrics (utilization, memory, temperature).
  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    restart: unless-stopped
    cap_add: [SYS_ADMIN]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
