# prometheus.example.yml — copy to prometheus.yml. Placeholder targets only.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gpu
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  - job_name: inference-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]
